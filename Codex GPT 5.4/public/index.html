<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Async Report Generation Queue Demo</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="layout">
      <section class="hero">
        <p class="eyebrow">Queue demo</p>
        <h1>Async report generation queue</h1>
        <p class="hero-copy">
          Submit report requests, let background workers process them, and poll
          for status updates without blocking the request/response cycle.
        </p>
      </section>

      <section class="panel">
        <h2>Create a report job</h2>
        <form id="report-form" class="report-form">
          <label>
            Report name
            <input name="reportName" value="Revenue Snapshot" required />
          </label>

          <label>
            Report type
            <select name="reportType">
              <option value="sales">sales</option>
              <option value="finance">finance</option>
              <option value="operations">operations</option>
            </select>
          </label>

          <label>
            Requested by
            <input name="requestedBy" value="demo@company.com" required />
          </label>

          <label>
            Date range
            <input name="dateRange" value="2026-01-01 to 2026-03-15" required />
          </label>

          <button type="submit">Queue report</button>
        </form>
        <p id="form-message" class="form-message"></p>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>Jobs</h2>
          <button id="refresh-button" class="secondary-button" type="button">
            Refresh
          </button>
        </div>
        <div id="jobs" class="jobs"></div>
      </section>
    </main>

    <template id="job-template">
      <article class="job-card">
        <div class="job-topline">
          <div>
            <h3 class="job-title"></h3>
            <p class="job-meta"></p>
          </div>
          <span class="job-status"></span>
        </div>
        <div class="progress-track">
          <div class="progress-bar"></div>
        </div>
        <p class="job-detail"></p>
        <pre class="job-preview"></pre>
        <a class="download-link" target="_blank" rel="noreferrer">Download</a>
        <ul class="timeline"></ul>
      </article>
    </template>

    <script src="/app.js"></script>
  </body>
</html>
